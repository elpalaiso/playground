<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#12171f">
<title>손실 회선 · LOSSY LINE · Codex build</title>
<script src="../build-meta.js" defer></script>
<style>
  :root{--bg:#12171f;--panel:#19212b;--ink:#e9eef3;--dim:#8491a1;--line:#344153;--lime:#b8dc4b;--blue:#66a8ff;--red:#ff6961;--amber:#f2bd56;--build-meta-color:var(--dim)}
  *{box-sizing:border-box;margin:0;padding:0}html{background:var(--bg)}body{min-height:100dvh;background:var(--bg);color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Cascadia Mono",monospace;font-variant-numeric:tabular-nums}button{font:inherit}button:focus-visible{outline:2px solid var(--lime);outline-offset:3px}
  #app{width:min(100%,520px);min-height:100dvh;margin:auto;padding:calc(12px + env(safe-area-inset-top)) 11px calc(18px + env(safe-area-inset-bottom));display:flex;flex-direction:column}
  .statusbar{border:1px solid var(--line);display:grid;grid-template-columns:1fr repeat(3,auto);gap:12px;padding:8px;color:var(--dim);font-size:10px}.statusbar b{display:block;color:var(--ink);font-size:14px;margin-top:2px}.statusbar .trust b{color:var(--lime)}
  .brief{padding:15px 2px 10px}.kicker{color:var(--blue);font-size:10px;font-weight:900}.brief h1{font-size:23px;margin-top:5px}.brief p{color:var(--dim);font:12px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin-top:7px}
  .receiver{border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:10px 0}.receiver-head{display:flex;justify-content:space-between;color:var(--dim);font-size:10px}.receiver-head strong{color:var(--amber)}#device{margin-top:8px;background:#0b0f14;border-left:4px solid var(--line);padding:10px;color:var(--dim);font-size:12px;line-height:1.55;white-space:pre-wrap}#device.safe{border-color:var(--lime);color:var(--lime)}#device.fail{border-color:var(--red);color:var(--red)}
  .channel{padding-top:13px}.channel-title{display:flex;justify-content:space-between;color:var(--dim);font-size:10px}.channel-title b{color:var(--ink)}
  #sequence{display:flex;align-items:center;justify-content:center;min-height:48px;margin-top:8px;overflow:hidden}.gap{flex:0 0 7px;width:7px;height:32px;border:0;background:none;color:var(--blue);font-size:11px;padding:0}.char{flex:0 0 22px;width:22px;height:34px;border:1px solid var(--line);background:var(--panel);color:var(--ink);font-weight:900;border-radius:2px}.char.filler{color:var(--blue);border-color:var(--blue)}.char.lost{text-decoration:line-through;color:var(--red);border-color:var(--red);background:#29191d}.char:disabled{opacity:1}.gap:disabled{opacity:.15}
  .mask-grid,.receive-grid{display:grid;grid-template-columns:repeat(13,minmax(0,1fr));gap:2px;margin-top:7px}.mask-cell,.recv-cell{height:24px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--line);color:var(--dim);font-size:11px}.mask-cell.drop{color:var(--red);border-color:var(--red);font-weight:900}.mask-cell.guard{color:var(--lime);border-color:var(--lime)}.recv-cell{height:30px;color:var(--ink);font-size:14px;font-weight:900}.recv-cell.missing{color:var(--red)}
  .preview{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;margin-top:9px;padding:8px 0;border-top:1px dashed var(--line);color:var(--dim);font-size:10px}.preview strong{color:var(--red);font-size:13px}.preview strong.safe{color:var(--lime)}
  .fillers{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}.filler-btn{min-height:43px;border:1px solid var(--blue);background:none;color:var(--blue);border-radius:3px;font-weight:900}.filler-btn.selected{background:var(--blue);color:var(--bg)}
  .actions{display:grid;grid-template-columns:52px 1fr;gap:7px;margin-top:8px}.assist,.send{min-height:52px;border-radius:3px;font-weight:900}.assist{border:1px solid var(--line);background:none;color:var(--dim);font-size:17px}.assist:disabled{opacity:.25}.send{border:0;background:var(--lime);color:#10150a}.send.next{background:var(--ink);color:var(--bg)}
  .event{min-height:42px;margin-top:9px;border-left:3px solid var(--line);padding:4px 0 4px 9px;color:var(--dim);font:12px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.event.good{border-color:var(--lime);color:var(--lime)}.event.bad{border-color:var(--red);color:var(--red)}
  footer{margin-top:auto;border-top:1px solid var(--line);padding-top:12px;color:var(--dim);font-size:10px;line-height:1.6}footer b{color:var(--ink)}#logbook{color:var(--amber);margin-top:3px;overflow-wrap:anywhere}
  .overlay{position:fixed;inset:0;z-index:10;background:rgba(12,16,22,.98);display:flex;overflow:auto;padding:18px}.overlay[hidden]{display:none}.sheet{width:min(100%,430px);margin:auto;border-top:6px solid var(--lime);padding-top:18px}.sheet-head{display:flex;justify-content:space-between;color:var(--dim);font-size:10px}.lang{border:1px solid var(--line);background:none;color:var(--ink);padding:4px 8px;border-radius:3px;font-size:10px;font-weight:900}.sheet h2{font-size:28px;margin-top:16px}.lead{color:var(--dim);font:13px/1.7 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin-top:10px}.demo{margin:16px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:12px 0;line-height:1.8;color:var(--ink)}.demo .x{color:var(--red)}.demo .safe{color:var(--lime)}.rules{color:var(--dim);font:12px/1.75 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.rules b{color:var(--ink)}.wide{width:100%;min-height:54px;border:0;border-radius:3px;background:var(--lime);color:#10150a;font-weight:900;margin-top:16px}.cards{display:grid;gap:7px;margin-top:12px}.reward{min-height:62px;text-align:left;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:3px;padding:9px}.reward b{color:var(--lime)}.reward small{display:block;color:var(--dim);font-size:10px;margin-top:4px}.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:15px 0}.result-grid div{border-top:2px solid var(--line);padding-top:7px;color:var(--dim);font-size:9px}.result-grid b{display:block;color:var(--ink);font-size:20px}.story{border-left:3px solid var(--amber);padding-left:10px;color:var(--amber);font-size:12px;line-height:1.7}
  @media(max-width:370px){#app{padding-left:8px;padding-right:8px}.statusbar{gap:7px}.char{flex-basis:19px;width:19px}.gap{flex-basis:5px;width:5px}.mask-cell,.recv-cell{font-size:9px}}
</style>
</head>
<body>
<main id="app">
  <header class="statusbar"><span>LOSSY LINE<b id="runNo">R1</b></span><span>PAD<b id="padNo">12</b></span><span class="trust">LINK<b id="trustNo">3</b></span><span>MSG<b id="msgNo">1/6</b></span></header>
  <section class="brief"><div class="kicker">TOY 10 · CODEX BUILD · ASCII INDEX</div><h1 id="title"></h1><p id="briefCopy"></p></section>
  <section class="receiver"><div class="receiver-head"><span id="receiverLabel"></span><strong id="meaning"></strong></div><pre id="device"></pre></section>
  <section class="channel">
    <div class="channel-title"><span id="sourceLabel"></span><b id="sourceWord"></b></div>
    <div id="sequence" aria-label="송신 문자열"></div>
    <div class="channel-title"><span>CHANNEL MASK</span><b id="maskCode"></b></div><div class="mask-grid" id="maskGrid"></div>
    <div class="channel-title" style="margin-top:9px"><span id="receiveLabel"></span><b id="cleanWord"></b></div><div class="receive-grid" id="receiveGrid"></div>
    <div class="preview"><span id="previewCopy"></span><strong id="previewState"></strong></div>
  </section>
  <div class="fillers" id="fillers"></div>
  <div class="actions"><button class="assist" id="assistBtn" type="button" title="Extra padding">+2</button><button class="send" id="sendBtn" type="button"></button></div>
  <div class="event" id="event" role="status"></div>
  <footer><b id="logTitle"></b><div id="logbook"></div><div class="build-meta" data-build-meta>DEPLOY 확인 중</div></footer>
</main>

<section class="overlay" id="cover"><div class="sheet"><div class="sheet-head"><span>FIELD TEST / 10</span><button class="lang" id="langBtn" type="button">EN</button></div><h2 id="coverTitle"></h2><p class="lead" id="coverLead"></p><div class="demo">MASK&nbsp; .<span class="x">X</span>..<span class="x">X</span>..<br>SEND&nbsp; O<span class="safe">.</span>PEN<span class="safe">_</span>7<br>RECV&nbsp; <span class="safe">OPEN7</span></div><div class="rules" id="coverRules"></div><button class="wide" id="startBtn" type="button"></button></div></section>
<section class="overlay" id="reward" hidden><div class="sheet"><div class="sheet-head"><span>ENCODER DRAW / 3 CHOICES</span><span id="rewardMsg"></span></div><h2 id="rewardTitle"></h2><p class="lead" id="rewardCopy"></p><div class="cards" id="rewardCards"></div></div></section>
<section class="overlay" id="result" hidden><div class="sheet"><div class="sheet-head"><span id="resultTag"></span><span id="resultRun"></span></div><h2 id="resultTitle"></h2><p class="lead" id="resultCopy"></p><div class="result-grid"><div><span id="safeLabel"></span><b id="safeNo"></b></div><div><span>PAD</span><b id="resPad"></b></div><div><span>LINK</span><b id="resTrust"></b></div></div><div class="story" id="story"></div><button class="wide" id="againBtn" type="button"></button></div></section>

<script>
"use strict";
const $=id=>document.getElementById(id);
const COPY={
ko:{title:"손실 회선 / LOSSY LINE",brief:"X 위치의 글자는 사라진다. 미끼 문자를 끼워 핵심 코드어를 안전한 인덱스로 밀어라.",receiver:"수신처",source:"원문",receive:"수신문",preview:"예측",safe:"핵심 보존",unsafe:"문자 손실",send:"전송한다",next:"다음 회선",event:"파란 + 사이를 탭해 미끼 문자를 끼운다. 파란 미끼는 탭해서 회수할 수 있다.",changed:"인덱스가 이동했고 수신문이 즉시 바뀌었다.",sentSafe:(w)=>`${w} 도착. 현장 장치가 명령을 실행했다.`,sentBad:(w)=>`${w} 일부가 사라졌다. 수신처가 잘못된 명령을 실행했다. LINK -1.`,assist:"긴급 패딩 +2를 한 번 사용했다.",log:"수신 기록",empty:"아직 온전한 코드어가 없다.",coverTitle:"손실 회선",coverLead:"회선은 정해진 문자 위치를 삼킨다. 미끼를 삽입하면 원문의 인덱스가 움직이고, 살아남는 글자가 달라진다.",coverRules:"문자 사이의 작은 <b>+</b>를 탭해 선택한 미끼를 삽입한다. 파란 미끼를 탭하면 회수한다.<br>수신문의 모든 핵심 문자가 살아 있으면 전송한다. 6개 장치 중 5개를 작동시키고 LINK를 유지한다.",start:"첫 회선 연결",rewardTitle:"인코더 선택",rewardCopy:"다음 회선의 손실 위치나 패딩 자원을 바꾼다.",rewards:{pad:["PAD +3","미끼 문자 3개를 추가한다."],shift:["PHASE +1","다음 회선의 X 위치를 한 칸 오른쪽으로 민다."],guard:["GUARD X1","다음 회선의 첫 X 위치를 보호한다."]},win:"격리 구역 연결",lose:"회선 단절",winCopy:"온전히 도착한 코드어가 격리 구역의 마지막 행동 기록이 됐다.",loseCopy:"한 글자의 손실이 문과 사람의 상태를 바꿨다.",again:"다시 연결",safeLabel:"정상 수신",story:"복원 명령"},
en:{title:"LOSSY LINE",brief:"Characters at X positions disappear. Insert decoys to push the critical code into safe indices.",receiver:"RECEIVER",source:"SOURCE",receive:"RECEIVED",preview:"PREDICTION",safe:"TOKEN SAFE",unsafe:"LETTER LOST",send:"SEND",next:"NEXT LINE",event:"Tap a blue + gap to insert a decoy. Tap a blue decoy to recover it.",changed:"Indices shifted and the received line changed immediately.",sentSafe:(w)=>`${w} arrived intact. The field device executed it.`,sentBad:(w)=>`Part of ${w} vanished. The receiver executed the wrong command. LINK -1.`,assist:"Emergency padding +2 used.",log:"RECEIVE LOG",empty:"No intact code word yet.",coverTitle:"LOSSY LINE",coverLead:"The channel eats fixed character positions. Inserting decoys moves the source indices and changes what survives.",coverRules:"Tap a small blue <b>+</b> between characters to insert the selected decoy. Tap a blue decoy to recover it.<br>Send when every critical character survives. Activate 5 of 6 devices while keeping the LINK alive.",start:"CONNECT FIRST LINE",rewardTitle:"CHOOSE ENCODER",rewardCopy:"Change the next line's loss positions or padding supply.",rewards:{pad:["PAD +3","Add three decoy characters."],shift:["PHASE +1","Shift every X in the next line one place right."],guard:["GUARD X1","Protect the first X in the next line."]},win:"QUARANTINE LINKED",lose:"LINE DISCONNECTED",winCopy:"The intact code words became the quarantine's final action log.",loseCopy:"One missing character changed the state of a door and a person.",again:"CONNECT AGAIN",safeLabel:"INTACT",story:"RESTORED ORDERS"}
};
const MESSAGES=[
 {word:"OPEN7",mask:[1,4],meaning:{ko:"7번 문 개방",en:"OPEN DOOR 7"},device:["DOOR 7 : LOCKED","DOOR 7 : OPEN","DOOR 7 : JAMMED"]},
 {word:"LAMP3",mask:[0,3],meaning:{ko:"3번 조명 점등",en:"LIGHT LAMP 3"},device:["LAMP 3 : DARK","LAMP 3 : ONLINE","LAMP 3 : BURNED"]},
 {word:"EVAC2",mask:[2,5],meaning:{ko:"2구역 대피",en:"EVACUATE ZONE 2"},device:["ZONE 2 : WAIT","ZONE 2 : CLEAR","ZONE 2 : SEALED"]},
 {word:"HOLD9",mask:[1,3,6],meaning:{ko:"9번 격실 유지",en:"HOLD CELL 9"},device:["CELL 9 : OPEN","CELL 9 : HELD","CELL 9 : LOST"]},
 {word:"NORTH4",mask:[0,2,5],meaning:{ko:"북쪽 4번 통로",en:"NORTH ROUTE 4"},device:["ROUTE 4 : UNKNOWN","ROUTE 4 : NORTH","ROUTE 4 : SOUTH"]},
 {word:"ALIVE8",mask:[1,4,7],meaning:{ko:"생존자 8명",en:"EIGHT ALIVE"},device:["COUNT : --","COUNT : ALIVE 8","COUNT : ALIVE ?"]}
];
const FILLERS=[".","_","0"];
let lang="ko",run=0,meta={best:[]},state=null;
function t(k){return COPY[lang][k]}
function begin(){run++;state={msg:0,pad:12,trust:3,safe:0,selected:".",items:[],sent:false,assist:1,shiftNext:0,guardNext:0,log:[],started:performance.now()};loadMessage();renderAll()}
function message(){return MESSAGES[state.msg]}
function activeMask(){let m=message().mask.map(x=>x+state.shiftNext);if(state.guardNext&&m.length)m=m.slice(1);return m.filter(x=>x<13)}
function loadMessage(){state.items=message().word.split("").map((ch,i)=>({ch,orig:i}));state.sent=false;state.shiftNext=state.shiftNext||0;state.guardNext=state.guardNext||0;$("event").className="event";$("event").textContent=t("event")}
function analysis(){const mask=new Set(activeMask()),survive=Array(message().word.length).fill(false);state.items.forEach((it,i)=>{if(it.orig!==null&&!mask.has(i))survive[it.orig]=true});const clean=message().word.split("").map((ch,i)=>survive[i]?ch:"□");return{mask,survive,clean,safe:survive.every(Boolean)}}
function insertAt(index){if(state.sent||state.pad<=0)return;state.items.splice(index,0,{ch:state.selected,orig:null});state.pad--;$("event").textContent=t("changed");renderAll()}
function removeAt(index){if(state.sent||state.items[index].orig!==null)return;state.items.splice(index,1);state.pad++;$("event").textContent=t("changed");renderAll()}
function renderSequence(){const a=analysis(),box=$("sequence");box.replaceChildren();for(let i=0;i<=state.items.length;i++){const gap=document.createElement("button");gap.type="button";gap.className="gap";gap.textContent="+";gap.disabled=state.sent||state.pad<=0||state.items.length>=12;gap.title="INSERT "+state.selected;gap.onclick=()=>insertAt(i);box.appendChild(gap);if(i<state.items.length){const it=state.items[i],b=document.createElement("button");b.type="button";b.className="char"+(it.orig===null?" filler":"")+(a.mask.has(i)?" lost":"");b.textContent=it.ch;b.disabled=state.sent||it.orig!==null;b.title=it.orig===null?"REMOVE":"SOURCE";if(it.orig===null)b.onclick=()=>removeAt(i);box.appendChild(b)}}}
function renderMask(){const a=analysis(),m=$("maskGrid"),r=$("receiveGrid");m.replaceChildren();r.replaceChildren();for(let i=0;i<13;i++){const x=document.createElement("span");x.className="mask-cell"+(a.mask.has(i)?" drop":"");x.textContent=a.mask.has(i)?"X":"·";m.appendChild(x);const y=document.createElement("span");y.className="recv-cell"+(i<a.clean.length&&!a.survive[i]?" missing":"");y.textContent=i<a.clean.length?a.clean[i]:"·";r.appendChild(y)}$("maskCode").textContent=Array.from({length:13},(_,i)=>a.mask.has(i)?"X":".").join("");$("cleanWord").textContent=a.clean.join("");$("previewState").textContent=a.safe?t("safe"):t("unsafe");$("previewState").className=a.safe?"safe":""}
function renderFillers(){$("fillers").replaceChildren();FILLERS.forEach(ch=>{const b=document.createElement("button");b.type="button";b.className="filler-btn"+(state.selected===ch?" selected":"");b.textContent="+ "+ch;b.disabled=state.sent;b.onclick=()=>{state.selected=ch;renderFillers()};$("fillers").appendChild(b)})}
function renderDevice(){const a=analysis(),mode=state.sent?(a.safe?1:2):0;$("device").textContent=message().device[mode]+"\nRX > "+a.clean.join("");$("device").className=state.sent?(a.safe?"safe":"fail"):""}
function renderLog(){const items=state.log.map(x=>x.ok?x.word:"["+x.word.replace(/./g,"?")+"]");$("logbook").textContent=items.length?items.join(" / "):t("empty")}
function renderAll(){document.documentElement.lang=lang;$("runNo").textContent="R"+run;$("padNo").textContent=state.pad;$("trustNo").textContent=state.trust;$("msgNo").textContent=state.msg+1+"/6";$("title").textContent=t("title");$("briefCopy").textContent=t("brief");$("receiverLabel").textContent=t("receiver");$("meaning").textContent=message().meaning[lang];$("sourceLabel").textContent=t("source");$("sourceWord").textContent=message().word;$("receiveLabel").textContent=t("receive");$("previewCopy").textContent=t("preview");$("logTitle").textContent=t("log");$("assistBtn").disabled=state.sent||state.assist<=0;$("sendBtn").textContent=state.sent?t("next"):t("send");$("sendBtn").className="send"+(state.sent?" next":"");renderSequence();renderMask();renderFillers();renderDevice();renderLog()}
function send(){if(state.sent){next();return}const a=analysis();state.sent=true;state.log.push({word:message().word,ok:a.safe});if(a.safe){state.safe++;$("event").className="event good";$("event").textContent=t("sentSafe")(message().word)}else{state.trust--;$("event").className="event bad";$("event").textContent=t("sentBad")(message().word)}renderAll();if(state.trust<=0)setTimeout(finish,400)}
function next(){if(state.msg>=MESSAGES.length-1){finish();return}const just=state.msg+1;state.msg++;if(just===2||just===4){openReward();return}state.shiftNext=0;state.guardNext=0;loadMessage();renderAll()}
function openReward(){$("rewardMsg").textContent=`MSG ${state.msg+1}/6`;$("rewardTitle").textContent=t("rewardTitle");$("rewardCopy").textContent=t("rewardCopy");const box=$("rewardCards");box.replaceChildren();["pad","shift","guard"].forEach(k=>{const [name,desc]=t("rewards")[k],b=document.createElement("button");b.type="button";b.className="reward";b.innerHTML=`<b>${name}</b><small>${desc}</small>`;b.onclick=()=>{if(k==="pad")state.pad+=3;if(k==="shift")state.shiftNext=1;if(k==="guard")state.guardNext=1;$("reward").hidden=true;loadMessage();renderAll()};box.appendChild(b)});$("reward").hidden=false}
function assist(){if(state.assist<=0||state.sent)return;state.assist--;state.pad+=2;$("event").textContent=t("assist");renderAll()}
function finish(){const won=state.safe>=5&&state.trust>0;if(won&&state.safe>meta.best.length)meta.best=state.log.filter(x=>x.ok).map(x=>x.word);$("resultTag").textContent=won?"LINKED":"DROPPED";$("resultRun").textContent=`R${run} · ${Math.round((performance.now()-state.started)/1000)}s`;$("resultTitle").textContent=won?t("win"):t("lose");$("resultCopy").textContent=won?t("winCopy"):t("loseCopy");$("safeLabel").textContent=t("safeLabel");$("safeNo").textContent=state.safe+"/6";$("resPad").textContent=state.pad;$("resTrust").textContent=state.trust;$("story").textContent=t("story")+": "+state.log.map(x=>x.ok?x.word:"[LOST]").join(" ");$("againBtn").textContent=t("again");$("result").hidden=false}
function renderCover(){document.documentElement.lang=lang;$("coverTitle").textContent=t("coverTitle");$("coverLead").textContent=t("coverLead");$("coverRules").innerHTML=t("coverRules");$("startBtn").textContent=t("start");$("langBtn").textContent=lang==="ko"?"EN":"KO"}
$("langBtn").onclick=()=>{lang=lang==="ko"?"en":"ko";renderCover()};$("startBtn").onclick=()=>{$("cover").hidden=true;begin()};$("sendBtn").onclick=send;$("assistBtn").onclick=assist;$("againBtn").onclick=()=>{$("result").hidden=true;begin()};renderCover();
window.__TOY10__={start:()=>{$("cover").hidden=true;begin()},insert:insertAt,remove:removeAt,send,getState:()=>state?JSON.parse(JSON.stringify(state)):null};
</script>
</body>
</html>

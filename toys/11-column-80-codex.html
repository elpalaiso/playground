<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#e8edf0">
<title>80열 생존자 · COLUMN 80 · Codex build</title>
<script src="../build-meta.js" defer></script>
<style>
  :root{--paper:#e8edf0;--ink:#171b20;--dim:#68737d;--rule:#aab4bc;--cyan:#007f8b;--red:#d8483e;--amber:#d99719;--green:#2d7d54;--unit:clamp(8px,2.45vw,12px);--build-meta-color:var(--dim)}
  *{box-sizing:border-box;margin:0;padding:0}html{background:var(--paper)}body{min-height:100dvh;background:var(--paper);color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Cascadia Mono",monospace;font-variant-numeric:tabular-nums}button{font:inherit}button:focus-visible{outline:2px solid var(--cyan);outline-offset:3px}
  #app{width:min(100%,540px);min-height:100dvh;margin:auto;padding:calc(13px + env(safe-area-inset-top)) 12px calc(18px + env(safe-area-inset-bottom));display:flex;flex-direction:column}
  .top{border-top:7px solid var(--ink);display:grid;grid-template-columns:1fr repeat(4,auto);gap:10px;padding:9px 0;border-bottom:1px solid var(--ink);color:var(--dim);font-size:9px}.top b{display:block;color:var(--ink);font-size:14px;margin-top:2px}.top .signal b{color:var(--cyan)}
  .brief{padding:15px 0 10px}.kicker{color:var(--cyan);font-size:10px;font-weight:900}.brief h1{font-size:23px;margin-top:5px}.brief p{color:var(--dim);font:12px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin-top:7px}
  .terminal{border:1px solid var(--ink);background:#f7f9fa;padding:10px 8px 9px}.ruler{height:17px;display:flex;justify-content:space-between;color:var(--dim);font-size:8px;border-bottom:1px solid var(--rule)}.ruler .limit{color:var(--red);font-weight:900}
  #streamViewport{width:min(100%,calc(var(--unit) * 32));height:48px;overflow:hidden;margin:9px auto 0;border-right:3px solid var(--red);background:#dce3e7;position:relative}#stream{display:flex;align-items:stretch;height:100%;width:max-content;min-width:100%;transition:width .15s ease}.token{flex:0 0 auto;width:calc(var(--unit) * var(--w));min-width:calc(var(--unit) * var(--w));border:0;border-right:1px solid #c4cdd2;background:#f7f9fa;color:var(--ink);font-size:clamp(10px,3.1vw,15px);font-weight:900;white-space:nowrap;overflow:hidden;padding:0}.token.signal{color:var(--cyan);background:#d7f1f1}.token.exit{color:white;background:var(--ink)}.token.group:hover{background:#fff}.token.packed{color:var(--amber);background:#fff4d8}.token.enemy{color:var(--red)}.token.crew{color:var(--green)}.token.log{color:var(--cyan)}.token[disabled]{opacity:1}.stream-text{margin-top:8px;min-height:20px;color:var(--dim);font-size:11px;overflow-wrap:anywhere}.stream-text .overflow{color:var(--red);font-weight:900}
  .meters{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.meter{border-top:2px solid var(--rule);padding-top:6px;color:var(--dim);font-size:9px}.meter b{display:block;color:var(--ink);font-size:14px}.meter.bad{border-color:var(--red)}.meter.bad b{color:var(--red)}.meter.good{border-color:var(--green)}
  .incoming{margin-top:12px;border-left:3px solid var(--amber);padding-left:9px;color:var(--dim);font-size:10px;line-height:1.5}.incoming b{display:block;color:var(--ink);font-size:13px;margin-top:2px}
  .legend{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:11px}.legend div{border:1px solid var(--rule);padding:6px 3px;text-align:center;color:var(--dim);font-size:8px}.legend b{display:block;color:var(--ink);font-size:13px;margin-bottom:2px}
  .actions{display:grid;grid-template-columns:52px 52px 1fr;gap:7px;margin-top:10px}.icon,.commit{min-height:52px;border-radius:3px;font-weight:900}.icon{border:1px solid var(--rule);background:none;color:var(--dim);font-size:19px}.icon:disabled{opacity:.25}.commit{border:0;background:var(--ink);color:var(--paper)}
  .event{min-height:45px;margin-top:9px;padding:6px 0;border-top:1px solid var(--rule);color:var(--dim);font:12px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.event.good{color:var(--green)}.event.bad{color:var(--red)}
  footer{margin-top:auto;border-top:2px solid var(--ink);padding-top:11px;color:var(--dim);font-size:10px;line-height:1.6}footer b{color:var(--ink)}#archive{color:var(--cyan);margin-top:3px}
  .overlay{position:fixed;inset:0;z-index:10;background:rgba(232,237,240,.98);display:flex;overflow:auto;padding:18px}.overlay[hidden]{display:none}.sheet{width:min(100%,430px);margin:auto;border-top:8px solid var(--cyan);padding-top:18px}.sheet-head{display:flex;justify-content:space-between;color:var(--dim);font-size:10px}.lang{border:1px solid var(--ink);background:none;color:var(--ink);border-radius:3px;padding:4px 8px;font-size:10px;font-weight:900}.sheet h2{font-size:27px;margin-top:16px}.lead{color:var(--dim);font:13px/1.7 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin-top:10px}.demo{margin:16px 0;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);padding:11px 0;font-size:16px;line-height:1.8}.demo .packed{color:var(--amber)}.demo .active{color:var(--green)}.rules{color:var(--dim);font:12px/1.75 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.rules b{color:var(--ink)}.wide{width:100%;min-height:54px;border:0;border-radius:3px;background:var(--cyan);color:white;font-weight:900;margin-top:16px}.cards{display:grid;gap:7px;margin-top:12px}.codec{min-height:62px;text-align:left;border:1px solid var(--rule);background:#f7f9fa;color:var(--ink);border-radius:3px;padding:9px}.codec b{color:var(--cyan)}.codec small{display:block;color:var(--dim);font-size:10px;margin-top:4px}.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:15px 0}.result-grid div{border-top:2px solid var(--rule);padding-top:7px;color:var(--dim);font-size:9px}.result-grid b{display:block;color:var(--ink);font-size:20px}.story{border-left:3px solid var(--cyan);padding-left:10px;color:var(--cyan);font-size:12px;line-height:1.7}
  @media(max-width:370px){#app{padding-left:8px;padding-right:8px}.top{gap:6px}.legend div{font-size:7px}.terminal{padding-left:5px;padding-right:5px}}
  @media(prefers-reduced-motion:reduce){#stream{transition:none}}
</style>
</head>
<body>
<main id="app">
  <header class="top"><span>COLUMN 80<b id="runNo">R1</b></span><span class="signal">SIG<b id="sigNo">SOS</b></span><span>WIDTH<b id="widthNo">04/32</b></span><span>HULL<b id="hullNo">2</b></span><span>WAVE<b id="waveNo">1/8</b></span></header>
  <section class="brief"><div class="kicker">TOY 11 · CODEX BUILD · STRING PHYSICS</div><h1 id="title"></h1><p id="briefCopy"></p></section>
  <section class="terminal" aria-label="고정 폭 문자열 세계"><div class="ruler"><span>01</span><span>16</span><span class="limit">32│</span></div><div id="streamViewport"><div id="stream"></div></div><div class="stream-text" id="streamText"></div></section>
  <div class="meters"><div class="meter" id="widthMeter"><span id="widthLabel"></span><b id="widthState"></b></div><div class="meter" id="exitMeter"><span id="exitLabel"></span><b id="exitState"></b></div></div>
  <div class="incoming"><span id="incomingLabel"></span><b id="incomingText"></b></div>
  <div class="legend"><div><b>oooo</b><span id="crewLegend"></span></div><div><b>#####</b><span id="wallLegend"></span></div><div><b>*****</b><span id="enemyLegend"></span></div><div><b>!!!!</b><span id="logLegend"></span></div></div>
  <div class="actions"><button class="icon" id="undoBtn" type="button" title="Undo">↶</button><button class="icon" id="boostBtn" type="button" title="Extra action">+1</button><button class="commit" id="commitBtn" type="button"></button></div>
  <div class="event" id="event" role="status"></div>
  <footer><b id="archiveTitle"></b><div id="archive"></div><div class="build-meta" data-build-meta>DEPLOY 확인 중</div></footer>
</main>

<section class="overlay" id="cover"><div class="sheet"><div class="sheet-head"><span>FIELD TEST / 11</span><button class="lang" id="langBtn" type="button">EN</button></div><h2 id="coverTitle"></h2><p class="lead" id="coverLead"></p><div class="demo"><span>#####</span> → <span class="packed">5#</span> <small>2 COL</small><br><span class="packed">4o</span> → <span class="active">oooo</span> <small>ACTIVE</small></div><div class="rules" id="coverRules"></div><button class="wide" id="startBtn" type="button"></button></div></section>
<section class="overlay" id="codec" hidden><div class="sheet"><div class="sheet-head"><span>CODEC DRAW / 3 CHOICES</span><span id="codecWave"></span></div><h2 id="codecTitle"></h2><p class="lead" id="codecCopy"></p><div class="cards" id="codecCards"></div></div></section>
<section class="overlay" id="result" hidden><div class="sheet"><div class="sheet-head"><span id="resultTag"></span><span id="resultRun"></span></div><h2 id="resultTitle"></h2><p class="lead" id="resultCopy"></p><div class="result-grid"><div><span id="crewLabel"></span><b id="resCrew"></b></div><div><span id="logLabel"></span><b id="resLog"></b></div><div><span>OVER</span><b id="resOver"></b></div></div><div class="story" id="story"></div><button class="wide" id="againBtn" type="button"></button></div></section>

<script>
"use strict";
const $=id=>document.getElementById(id);
const COPY={
ko:{title:"80열 생존자 / COLUMN 80",brief:"반복 문자열을 접어 칸을 만든다. 접힌 존재는 안전하지만, 다시 펼쳐야 출구에서 행동한다.",width:"현재 폭",exit:"출구 처리",fit:"범위 안",overflow:(n)=>`${n}칸 초과`,waiting:"펼쳐진 마지막 묶음만 처리",blocked:"압축 묶음이 출구를 막음",incoming:"이번 파동 삽입",crew:"생존자",wall:"선체 보강",enemy:"침입자",log:"기록",commit:"파동 확정",next:"다음 파동",event:"반복 묶음을 탭하면 즉시 압축·해제된다. 오른쪽 출구 앞의 펼친 묶음만 처리된다.",packed:(n,ch)=>`${n}${ch}로 압축했다. 문자열 폭이 즉시 줄었다.`,unpacked:(n,ch)=>`${n}${ch}를 펼쳤다. 이제 출구에서 상호작용할 수 있다.`,processed:{o:n=>`생존자 ${n}명이 출구로 빠져나갔다.`,"#":n=>`선체 문자 ${n}개가 출구를 보강했다.`,"*":n=>`침입자 ${n}개가 출구를 때렸다. HULL -1.`,"!":n=>`기록 ${n}글자를 회수했다.`,".":n=>`잡음 ${n}칸을 비웠다.`},stalled:"압축 묶음은 비활성이다. 출구 처리가 멈췄다.",overflowEvent:"폭 제한을 넘겨 구조 신호 한 글자가 ?로 손실됐다.",boost:"긴급 코덱으로 이번 파동 행동 +1.",archive:"복원 기록",empty:"아직 회수된 기록이 없다.",coverTitle:"80열 생존자",coverLead:"세계는 고정 폭 문자열이다. 압축 표기가 실제 칸을 줄이고, 해제된 문자만 사람·벽·적의 성질을 되찾는다.",coverRules:"반복 묶음을 탭해 <b>##### ↔ 5#</b>처럼 접고 편다. 매 파동에는 기본 행동 1회가 있다.<br>오른쪽 <b>&gt;</b> 앞에서 펼친 <b>o</b>는 구조되고, <b>#</b>는 보강하며, <b>*</b>는 피해를 준다. 32칸을 넘기면 <b>SOS</b>가 한 글자씩 손실된다.",start:"첫 파동 수신",codecTitle:"코덱 선택",codecCopy:"다음 파동의 칸·행동 규칙을 바꾼다.",codecs:{buffer:["BUFFER +4","최대 폭을 4칸 늘린다."],burst:["BURST +1","다음 파동 행동을 1회 추가한다."],dict:["DICT 1-COL","압축 묶음을 이후 1칸 코드로 기록한다."]},win:"구조 신호 전송",lose:"신호 소실",winCopy:"SOS와 회수 인원이 고정 폭 회선을 통과했다.",loseCopy:"넘친 칸이 구조 신호의 원문을 바꿨다.",again:"다시 압축",crewLabel:"구조",logLabel:"기록",story:"최종 신호"},
en:{title:"COLUMN 80",brief:"Fold repeated strings to make room. Packed entities are safe but inactive until expanded at the exit.",width:"CURRENT WIDTH",exit:"EXIT PROCESS",fit:"WITHIN LIMIT",overflow:n=>`${n} COL OVER`,waiting:"Only the expanded last group resolves",blocked:"A packed group blocks the exit",incoming:"WAVE INSERT",crew:"SURVIVORS",wall:"HULL REPAIR",enemy:"INTRUDERS",log:"RECORD",commit:"COMMIT WAVE",next:"NEXT WAVE",event:"Tap a repeated group to compress or expand it immediately. Only an expanded group at the right exit resolves.",packed:(n,ch)=>`Compressed to ${n}${ch}. The world became shorter immediately.`,unpacked:(n,ch)=>`Expanded ${n}${ch}. It can now interact at the exit.`,processed:{o:n=>`${n} survivors exited.`,"#":n=>`${n} hull characters reinforced the exit.`,"*":n=>`${n} intruders hit the exit. HULL -1.`,"!":n=>`Recovered ${n} record characters.`,".":n=>`Cleared ${n} noise columns.`},stalled:"Packed groups are inactive. Exit processing stalled.",overflowEvent:"The line exceeded its width. One SOS character became ?.",boost:"Emergency codec: +1 action this wave.",archive:"RESTORED RECORD",empty:"No record recovered yet.",coverTitle:"COLUMN 80",coverLead:"The world is a fixed-width string. Compression notation removes real columns, and only expanded characters regain their behavior.",coverRules:"Tap a repeated group to fold or unfold it like <b>##### ↔ 5#</b>. Each wave starts with one action.<br>At the right <b>&gt;</b>, expanded <b>o</b> evacuates, <b>#</b> repairs, and <b>*</b> damages. Exceeding 32 columns corrupts <b>SOS</b> one character at a time.",start:"RECEIVE FIRST WAVE",codecTitle:"CHOOSE CODEC",codecCopy:"Change the next wave's width or action rules.",codecs:{buffer:["BUFFER +4","Increase maximum width by four."],burst:["BURST +1","Gain one extra action next wave."],dict:["DICT 1-COL","Store every packed group as a one-column code."]},win:"SIGNAL TRANSMITTED",lose:"SIGNAL LOST",winCopy:"SOS and the recovered people crossed the fixed-width line.",loseCopy:"Overflow changed the source text of the distress signal.",again:"COMPRESS AGAIN",crewLabel:"SAVED",logLabel:"LOG",story:"FINAL SIGNAL"}
};
const WAVES=[
 [["#",5],["o",4]],
 [["*",4],[".",6]],
 [["o",5],["#",6]],
 [["!",4],["*",5]],
 [["o",6],["#",7]],
 [["#",7],[".",5]],
 [["*",6],["o",5]],
 [[".",7],["!",5]]
];
const FRAGMENTS={ko:["열은 공간이 아니라 기억의 한계였다.","압축된 사람은 죽지 않았지만 대답할 수도 없었다."],en:["The columns measured memory, not space.","Packed people did not die, but they could not answer."]};
let lang="ko",run=0,idSeq=0,meta={fragments:new Set()},state=null;
function t(k){return COPY[lang][k]}
function cloneGroups(g){return g.map(x=>({...x}))}
function encodedWidth(g){return g.packed?(state.dictionary?1:2):g.count}
function totalWidth(){return 4+state.groups.reduce((n,g)=>n+encodedWidth(g),0)}
function begin(){run++;state={wave:0,groups:[],signal:["S","O","S"],cap:32,hull:2,rescued:0,logs:0,overflow:0,actions:1,actionMax:1,burst:0,dictionary:false,boost:1,committed:false,snapshot:null,started:performance.now()};loadWave();renderAll()}
function loadWave(){const incoming=WAVES[state.wave].map(([ch,count])=>({id:++idSeq,ch,count,packed:false}));state.groups=incoming.concat(state.groups);state.actionMax=1+state.burst;state.actions=state.actionMax;state.burst=0;state.committed=false;state.snapshot={groups:cloneGroups(state.groups),actions:state.actions};$("event").className="event";$("event").textContent=t("event")}
function groupText(g){return g.packed?(state.dictionary?"§":String(g.count)+g.ch):g.ch.repeat(g.count)}
function classFor(g){return g.ch==="o"?" crew":g.ch==="*"?" enemy":g.ch==="!"?" log":""}
function renderStream(){const box=$("stream");box.replaceChildren();const sig=document.createElement("button");sig.type="button";sig.disabled=true;sig.className="token signal";sig.style.setProperty("--w",3);sig.textContent=state.signal.join("");box.appendChild(sig);state.groups.forEach(g=>{const b=document.createElement("button");b.type="button";b.className="token group"+(g.packed?" packed":"")+classFor(g);b.style.setProperty("--w",encodedWidth(g));b.textContent=groupText(g);b.disabled=state.committed||state.actions<=0;b.title=g.packed?"EXPAND":"COMPRESS";b.onclick=()=>toggle(g.id);box.appendChild(b)});const exit=document.createElement("button");exit.type="button";exit.disabled=true;exit.className="token exit";exit.style.setProperty("--w",1);exit.textContent=">";box.appendChild(exit);const raw=state.signal.join("")+state.groups.map(groupText).join("")+">",over=Math.max(0,totalWidth()-state.cap);$("streamText").innerHTML=`${raw}${over?` <span class="overflow">+${over} OVER</span>`:""}`}
function renderMeters(){const w=totalWidth(),over=Math.max(0,w-state.cap),last=state.groups.at(-1);$("widthNo").textContent=String(w).padStart(2,"0")+"/"+state.cap;$("widthState").textContent=over?t("overflow")(over):t("fit");$("widthMeter").className="meter "+(over?"bad":"good");$("exitState").textContent=last&&last.packed?t("blocked"):t("waiting");$("exitMeter").className="meter "+(last&&last.packed?"bad":"good")}
function renderArchive(){$("archive").textContent=meta.fragments.size?[...meta.fragments].map(i=>"! "+FRAGMENTS[lang][i]).join(" / "):t("empty")}
function renderAll(){document.documentElement.lang=lang;$("runNo").textContent="R"+run;$("sigNo").textContent=state.signal.join("");$("hullNo").textContent=state.hull;$("waveNo").textContent=state.wave+1+"/8";$("title").textContent=t("title");$("briefCopy").textContent=t("brief");$("widthLabel").textContent=t("width");$("exitLabel").textContent=t("exit");$("incomingLabel").textContent=t("incoming");$("incomingText").textContent=WAVES[state.wave].map(([ch,n])=>ch.repeat(n)).join(" + ");$("crewLegend").textContent=t("crew");$("wallLegend").textContent=t("wall");$("enemyLegend").textContent=t("enemy");$("logLegend").textContent=t("log");$("archiveTitle").textContent=t("archive");$("undoBtn").disabled=state.committed||state.actions===state.actionMax;$("boostBtn").disabled=state.committed||state.boost<=0;$("commitBtn").textContent=state.committed?t("next"):t("commit");renderStream();renderMeters();renderArchive()}
function toggle(id){if(state.committed||state.actions<=0)return;const g=state.groups.find(x=>x.id===id);if(!g)return;g.packed=!g.packed;state.actions--;$("event").textContent=g.packed?t("packed")(g.count,g.ch):t("unpacked")(g.count,g.ch);renderAll()}
function undo(){if(state.committed||!state.snapshot)return;state.groups=cloneGroups(state.snapshot.groups);state.actions=state.actionMax;$("event").textContent=t("event");renderAll()}
function boost(){if(state.committed||state.boost<=0)return;state.boost--;state.actions++;state.actionMax++;$("event").textContent=t("boost");renderAll()}
function corruptSignal(){const i=state.signal.findIndex(ch=>ch!=="?");if(i>=0)state.signal[i]="?"}
function commit(){if(state.committed){advance();return}state.committed=true;let messages=[];if(totalWidth()>state.cap){state.overflow++;corruptSignal();messages.push(t("overflowEvent"))}const last=state.groups.at(-1);if(last&&!last.packed){state.groups.pop();if(last.ch==="o")state.rescued+=last.count;if(last.ch==="#")state.hull=Math.min(4,state.hull+1);if(last.ch==="*")state.hull--;if(last.ch==="!"){state.logs+=last.count;if(meta.fragments.size<FRAGMENTS.ko.length)meta.fragments.add(meta.fragments.size)}messages.push(t("processed")[last.ch](last.count))}else messages.push(t("stalled"));$("event").className="event "+(state.hull<=0||state.overflow?"bad":"good");$("event").textContent=messages.join(" ");renderAll();if(state.hull<=0||state.signal.every(ch=>ch==="?"))setTimeout(finish,450)}
function advance(){if(state.wave>=WAVES.length-1){finish();return}const completed=state.wave+1;state.wave++;if(completed===3||completed===6){openCodec();return}loadWave();renderAll()}
function openCodec(){$("codecWave").textContent=`WAVE ${state.wave+1}/8`;$("codecTitle").textContent=t("codecTitle");$("codecCopy").textContent=t("codecCopy");const box=$("codecCards");box.replaceChildren();["buffer","burst","dict"].forEach(k=>{const [name,desc]=t("codecs")[k],b=document.createElement("button");b.type="button";b.className="codec";b.innerHTML=`<b>${name}</b><small>${desc}</small>`;b.onclick=()=>{if(k==="buffer")state.cap+=4;if(k==="burst")state.burst=1;if(k==="dict")state.dictionary=true;$("codec").hidden=true;loadWave();renderAll()};box.appendChild(b)});$("codec").hidden=false}
function finish(){const won=state.rescued>=8&&state.logs>=1&&state.hull>0&&state.signal.some(ch=>ch!=="?");$("resultTag").textContent=won?"TRANSMITTED":"CORRUPTED";$("resultRun").textContent=`R${run} · ${Math.round((performance.now()-state.started)/1000)}s`;$("resultTitle").textContent=won?t("win"):t("lose");$("resultCopy").textContent=won?t("winCopy"):t("loseCopy");$("crewLabel").textContent=t("crewLabel");$("logLabel").textContent=t("logLabel");$("resCrew").textContent=state.rescued;$("resLog").textContent=state.logs;$("resOver").textContent=state.overflow;$("story").textContent=`${t("story")}: ${state.signal.join("")} / o=${state.rescued} / !=${state.logs}`;$("againBtn").textContent=t("again");$("result").hidden=false}
function renderCover(){document.documentElement.lang=lang;$("coverTitle").textContent=t("coverTitle");$("coverLead").textContent=t("coverLead");$("coverRules").innerHTML=t("coverRules");$("startBtn").textContent=t("start");$("langBtn").textContent=lang==="ko"?"EN":"KO"}
$("langBtn").onclick=()=>{lang=lang==="ko"?"en":"ko";renderCover()};$("startBtn").onclick=()=>{$("cover").hidden=true;begin()};$("undoBtn").onclick=undo;$("boostBtn").onclick=boost;$("commitBtn").onclick=commit;$("againBtn").onclick=()=>{$("result").hidden=true;begin()};renderCover();
window.__TOY11__={start:()=>{$("cover").hidden=true;begin()},toggle,commit,getState:()=>state?JSON.parse(JSON.stringify(state)):null};
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#eef1ee">
<title>TEXT GAME TOYS · 토이 실험장</title>
<script src="build-meta.js" defer></script>
<style>
  :root{
    --paper:#eef1ee;
    --ink:#151719;
    --act:#2457d6;
    --bad:#e5482d;
    --hold:#d7ee3a;
    --dim:#737a7c;
    --rule:rgba(21,23,25,.28);
    --build-meta-color:var(--dim);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ background:var(--paper); }
  body{
    min-height:100dvh;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    padding:calc(24px + env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom));
  }
  main{ width:min(100%,560px); margin:0 auto; }
  header{ border-top:8px solid var(--ink); border-bottom:2px solid var(--ink); padding:12px 0 18px; }
  .kicker{
    display:flex;
    justify-content:space-between;
    gap:12px;
    color:var(--dim);
    font:700 11px/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-variant-numeric:tabular-nums;
  }
  h1{ margin-top:18px; font-size:30px; line-height:1; font-weight:900; letter-spacing:0; }
  .intro{ margin-top:10px; max-width:42ch; color:var(--dim); font-size:13px; line-height:1.65; }
  .list{ border-top:1px solid var(--ink); margin-top:22px; }
  .entry{
    position:relative;
    display:grid;
    grid-template-columns:54px minmax(0,1fr) auto;
    gap:12px;
    align-items:start;
    min-height:112px;
    padding:16px 0;
    border-bottom:1px solid var(--rule);
    color:var(--ink);
    text-decoration:none;
  }
  a.entry:hover .title, a.entry:focus-visible .title{ color:var(--act); }
  a.entry:focus-visible{ outline:2px solid var(--act); outline-offset:5px; }
  .entry.current::before{
    content:"";
    position:absolute;
    left:-16px;
    top:0;
    bottom:0;
    width:5px;
    background:var(--hold);
  }
  .num{
    font:800 28px/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-variant-numeric:tabular-nums;
  }
  .eyebrow{ display:block; color:var(--dim); font-size:11px; font-weight:700; line-height:1.4; }
  .title{ display:block; margin-top:4px; font-size:18px; line-height:1.3; font-weight:850; }
  .question{ display:block; margin-top:8px; color:var(--dim); font-size:13px; line-height:1.55; }
  .status{
    min-width:58px;
    border:1px solid var(--ink);
    padding:4px 7px;
    color:var(--ink);
    text-align:center;
    font:800 10px/1.2 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    white-space:nowrap;
  }
  .status.live{ border-color:var(--act); color:var(--act); }
  .status.pass{ background:var(--ink); color:var(--paper); }

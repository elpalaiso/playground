<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f0eee7">
<title>겹쳐 찍기 · OVERPRINT · Codex build</title>
<script src="../build-meta.js" defer></script>
<style>
  :root{--paper:#f0eee7;--ink:#171918;--dim:#6f7471;--rule:#b8bbb5;--red:#d63b2f;--blue:#155cc5;--green:#207a57;--yellow:#f0c84a;--build-meta-color:var(--dim)}
  *{box-sizing:border-box;margin:0;padding:0}html{background:var(--paper)}body{min-height:100dvh;background:var(--paper);color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Cascadia Mono",monospace;font-variant-numeric:tabular-nums}button{font:inherit}button:focus-visible{outline:2px solid var(--blue);outline-offset:3px}
  #app{width:min(100%,540px);min-height:100dvh;margin:auto;padding:calc(14px + env(safe-area-inset-top)) 13px calc(18px + env(safe-area-inset-bottom));display:flex;flex-direction:column}
  .mast{border-top:7px solid var(--ink);border-bottom:2px solid var(--ink);padding:10px 0;display:flex;justify-content:space-between;align-items:start;gap:10px}.mast small{color:var(--dim);font-size:10px}.mast b{display:block;margin-top:3px;font-size:15px}.stats{display:flex;gap:10px;color:var(--dim);font-size:10px;text-align:right}.stats strong{display:block;color:var(--ink);font-size:15px}
  .brief{padding:15px 0 10px}.kicker{color:var(--red);font-size:10px;font-weight:900}.brief h1{font-size:23px;line-height:1.2;margin-top:5px;letter-spacing:0}.brief p{margin-top:7px;color:var(--dim);font:12px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .machine{border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);padding:11px 0}.machine-head{display:flex;justify-content:space-between;color:var(--dim);font-size:10px}.machine-head b{color:var(--blue)}#machineView{margin-top:9px;background:var(--ink);color:var(--paper);padding:10px 11px;min-height:64px;font-size:12px;line-height:1.55;white-space:pre-wrap}#machineView.good{color:#9af3c4}#machineView.bad{color:#ff9c8e}
  .press{margin-top:13px}.row{display:grid;grid-template-columns:50px minmax(0,1fr);align-items:center;margin-top:5px}.row-label{color:var(--dim);font-size:9px}.cells{display:grid;grid-template-columns:repeat(11,minmax(0,1fr));gap:2px}.cell{min-width:0;aspect-ratio:1;display:flex;align-items:center;justify-content:center;border:1px solid var(--rule);background:#faf9f4;font-size:clamp(13px,4.5vw,20px);font-weight:900}.cell.blank{color:#b6b8b2}.cell.target{border:2px solid var(--red)}.cell.ribbon{color:var(--blue);border-color:#8bb1e7;background:#edf4ff}.cell.fused{background:var(--ink);color:var(--paper)}.cell.jam{background:#ffe9e5;color:var(--red);border-color:var(--red)}.cell.hit{background:#e6f5ed;color:var(--green);border-color:var(--green)}
  .target-read{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;margin-top:10px;padding:8px 0;border-top:1px dashed var(--rule);font-size:11px;color:var(--dim)}.target-read strong{color:var(--red);font-size:16px}.target-read .ok{color:var(--green)}
  .section-title{display:flex;justify-content:space-between;align-items:end;margin-top:14px;color:var(--dim);font-size:9px}.section-title b{font-size:11px;color:var(--ink)}
  #ribbons{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px}.ribbon-card{min-height:65px;border:1px solid var(--rule);background:#faf9f4;color:var(--ink);border-radius:3px;padding:7px 4px}.ribbon-card code{display:block;color:var(--blue);font-size:16px;font-weight:900}.ribbon-card small{display:block;color:var(--dim);font-size:8px;margin-top:5px}.ribbon-card.selected{border:2px solid var(--blue);background:#edf4ff}.ribbon-card.rare code{color:var(--red)}
  .move{display:grid;grid-template-columns:52px 1fr 52px;gap:6px;margin-top:8px}.arrow{border:1px solid var(--ink);background:none;color:var(--ink);border-radius:3px;font-size:20px;min-height:47px}.position{border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:10px}.position b{color:var(--ink);margin-left:5px}.actions{display:grid;grid-template-columns:52px 1fr;gap:6px;margin-top:8px}.reroll,.print{min-height:52px;border-radius:3px;font-weight:900}.reroll{border:1px solid var(--rule);background:none;color:var(--dim);font-size:19px}.reroll:disabled{opacity:.25}.print{border:0;background:var(--red);color:white}.print:disabled{opacity:.3}.event{min-height:42px;margin-top:9px;padding:7px 0;border-top:1px solid var(--rule);color:var(--dim);font:12px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.event.good{color:var(--green)}.event.bad{color:var(--red)}
  footer{margin-top:auto;padding-top:13px;border-top:2px solid var(--ink);color:var(--dim);font-size:10px;line-height:1.6}footer b{color:var(--ink)}
  .overlay{position:fixed;inset:0;z-index:10;background:rgba(240,238,231,.98);display:flex;overflow:auto;padding:18px}.overlay[hidden]{display:none}.sheet{width:min(100%,430px);margin:auto;border-top:8px solid var(--red);padding-top:18px}.sheet-head{display:flex;justify-content:space-between;color:var(--dim);font-size:10px}.lang{border:1px solid var(--ink);background:none;color:var(--ink);border-radius:3px;padding:4px 8px;font-size:10px;font-weight:900}.sheet h2{font-size:28px;margin-top:16px}.lead{color:var(--dim);font:13px/1.7 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin-top:10px}.demo{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:16px 0}.demo div{border:1px solid var(--rule);padding:9px 4px;text-align:center;font-size:17px}.demo b{display:block;color:var(--red);font-size:10px;margin-top:5px}.rules{color:var(--dim);font:12px/1.75 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.rules strong{color:var(--ink)}.wide{width:100%;min-height:54px;border:0;border-radius:3px;background:var(--ink);color:var(--paper);font-weight:900;margin-top:16px}.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:15px 0}.result-grid div{border-top:2px solid var(--rule);padding-top:7px;color:var(--dim);font-size:9px}.result-grid b{display:block;color:var(--ink);font-size:20px}.story{padding:10px;border-left:3px solid var(--red);color:var(--ink);font-size:12px;line-height:1.7}
  @media(max-width:370px){#app{padding-left:9px;padding-right:9px}.row{grid-template-columns:42px minmax(0,1fr)}.cell{font-size:12px}.ribbon-card code{font-size:13px}}
</style>
</head>
<body>
<main id="app">
  <header class="mast"><div><small>TOY 09 · CODEX BUILD</small><b>OVERPRINT TELETYPE</b></div><div class="stats"><span>INK<strong id="inkNo">12</strong></span><span>JAM<strong id="jamNo">0/3</strong></span><span>LINE<strong id="lineNo">1/6</strong></span></div></header>
  <section class="brief"><div class="kicker">ASCII-NATIVE / STROKE FUSION</div><h1 id="title"></h1><p id="briefCopy"></p></section>
  <section class="machine"><div class="machine-head"><span id="machineLabel"></span><b id="machineNeed"></b></div><pre id="machineView"></pre></section>
  <section class="press" aria-label="전신지 합성기">
    <div class="row"><span class="row-label">BASE</span><div class="cells" id="baseRow"></div></div>
    <div class="row"><span class="row-label">RIBBON</span><div class="cells" id="ribbonRow"></div></div>
    <div class="row"><span class="row-label">PRINT</span><div class="cells" id="printRow"></div></div>
    <div class="target-read"><span id="targetCopy"></span><strong id="targetState"></strong></div>
  </section>
  <div class="section-title"><b id="ribbonTitle"></b><span id="ribbonHint"></span></div><div id="ribbons"></div>
  <div class="move"><button class="arrow" id="leftBtn" type="button" title="Left">←</button><div class="position"><span>OFFSET</span><b id="offsetNo">00</b></div><button class="arrow" id="rightBtn" type="button" title="Right">→</button></div>
  <div class="actions"><button class="reroll" id="rerollBtn" type="button" title="Reroll">↻</button><button class="print" id="printBtn" type="button"></button></div>
  <div class="event" id="event" role="status"></div>
  <footer><b id="archiveTitle"></b><div id="archive"></div><div class="build-meta" data-build-meta>DEPLOY 확인 중</div></footer>
</main>

<section class="overlay" id="cover"><div class="sheet"><div class="sheet-head"><span>FIELD TEST / 09</span><button class="lang" id="langBtn" type="button">EN</button></div><h2 id="coverTitle"></h2><p class="lead" id="coverLead"></p><div class="demo"><div>- + |<b>= +</b></div><div>/ + \<b>= X</b></div><div>( + )<b>= O</b></div></div><div class="rules" id="coverRules"></div><button class="wide" id="startBtn" type="button"></button></div></section>
<section class="overlay" id="result" hidden><div class="sheet"><div class="sheet-head"><span id="resultTag"></span><span id="resultRun"></span></div><h2 id="resultTitle"></h2><p class="lead" id="resultCopy"></p><div class="result-grid"><div><span id="okLabel"></span><b id="okNo"></b></div><div><span>INK</span><b id="resInk"></b></div><div><span>JAM</span><b id="resJam"></b></div></div><div class="story" id="story"></div><button class="wide" id="againBtn" type="button"></button></div></section>

<script>
"use strict";
const $=id=>document.getElementById(id);
const COPY={
ko:{title:"겹쳐 찍기 / OVERPRINT",brief:"아래 띠를 밀어 획을 겹친다. 인쇄된 글리프가 같은 화면의 기계를 작동시킨다.",machine:"현재 기계",target:(c,g)=>`COL ${String(c+1).padStart(2,"0")}에 ${g} 필요`,ready:"명령 일치",miss:"명령 불일치",ribbon:"리본 드로우",hint:"선택 후 좌우로 민다",print:"인쇄한다",next:"다음 전신",archive:"남은 활자",event:"리본을 고른 뒤 열을 맞춘다.",preview:"합성 결과가 즉시 바뀌었다. 검은 칸은 새 글리프, ?는 잼이다.",success:(g,j)=>`${g} 명령 작동. 잼 ${j}개만큼 잉크가 추가 소모됐다.`,failure:(g)=>`${g} 명령이 없어 기계가 멈췄다. JAM +1.`,coverTitle:"겹쳐 찍기",coverLead:"두 문자를 같은 열에 찍으면 획이 합쳐져 새 명령이 된다. 결과 글리프는 장식이 아니라 기계의 입력이다.",coverRules:"리본 3개 중 하나를 고르고 <strong>← →</strong>로 민다. 빨간 열에 필요한 글리프가 생기면 인쇄한다.<br><strong>- + | = +</strong>, <strong>/ + \\ = X</strong>, <strong>( + ) = O</strong>, <strong>[ + ] = #</strong>. 다른 두 획이 충돌하면 <strong>?</strong> 잼이 생긴다.",start:"첫 전신 투입",win:"전신기 재가동",lose:"활자실 폐쇄",winCopy:"여섯 기계가 같은 문장을 두 번 인쇄했다.",loseCopy:"잼이 활자보다 먼저 쌓였다.",again:"다시 인쇄",ok:"작동",story:"회수 문장"},
en:{title:"OVERPRINT",brief:"Slide the lower strip to overlap strokes. The printed glyph operates the machine on this screen.",machine:"CURRENT MACHINE",target:(c,g)=>`NEED ${g} AT COL ${String(c+1).padStart(2,"0")}`,ready:"COMMAND MATCH",miss:"NO COMMAND",ribbon:"RIBBON DRAW",hint:"Select, then slide",print:"PRINT",next:"NEXT LINE",archive:"LOOSE TYPE",event:"Choose a ribbon and align its columns.",preview:"The fused line changed immediately. Black cells are new glyphs; ? cells are jams.",success:(g,j)=>`${g} command fired. ${j} jams consumed extra ink.`,failure:(g)=>`No ${g} command reached the machine. JAM +1.`,coverTitle:"OVERPRINT",coverLead:"Printing two characters in one column fuses their strokes into a new command. The output glyph is the machine input.",coverRules:"Choose one of three ribbons and slide it with <strong>← →</strong>. Print when the red column contains the required glyph.<br><strong>- + | = +</strong>, <strong>/ + \\ = X</strong>, <strong>( + ) = O</strong>, <strong>[ + ] = #</strong>. Any unknown overlap becomes a <strong>?</strong> jam.",start:"LOAD FIRST LINE",win:"TELETYPE ONLINE",lose:"TYPE ROOM SEALED",winCopy:"All six machines printed the same sentence twice.",loseCopy:"Jams accumulated before the message did.",again:"PRINT AGAIN",ok:"ONLINE",story:"RECOVERED LINE"}
};
const MACHINES={plus:{glyph:"+",ko:"전력 문",en:"POWER GATE",art:{idle:"| POWER GATE |\n|    OFF     |",on:"+ POWER GATE +\n+    LIVE    +"}},x:{glyph:"X",ko:"압착기",en:"CRUSHER",art:{idle:"\\  CRUSHER  /\n \\   ARMED  /",on:"X  CRUSHER  X\nX   LOCKED  X"}},o:{glyph:"O",ko:"관측 렌즈",en:"OBSERVATION LENS",art:{idle:"( LENS CLOSED )\n(      ·      )",on:"O  LENS OPEN  O\nO      *      O"}},hash:{glyph:"#",ko:"기록 금고",en:"RECORD VAULT",art:{idle:"[ VAULT : -- ]\n[   SEALED   ]",on:"# VAULT : OK #\n#   OPENED   #"}}};
const STATIONS=[
 {m:"plus",col:2,base:"..-...R....",good:"|....",rare:"|./..",bad:"/....",letter:"R"},
 {m:"x",col:5,base:"...../....E",good:"\\....",rare:"\\.-..",bad:")....",letter:"E"},
 {m:"o",col:4,base:"....(...P..",good:")....",rare:").|..",bad:"]....",letter:"P"},
 {m:"hash",col:6,base:"......[.E..",good:"]....",rare:"]-/..",bad:"|....",letter:"E"},
 {m:"plus",col:3,base:"...|....A..",good:"-....",rare:"-.(..",bad:"\\....",letter:"A"},
 {m:"x",col:6,base:"......\\T...",good:"/....",rare:"/.-..",bad:"|....",letter:"T"}
];
let lang="ko",run=0,meta={lines:[]},state=null;
function t(k){return COPY[lang][k]}
function fuse(a,b){if(!b||b===" ")return a;if(a===".")return b;if(b===".")return a;if(a===b)return a;const key=[a,b].sort().join("");if(key==="-|")return "+";if(key==="/\\")return "X";if(key==="()")return "O";if(key==="[]")return "#";return "?"}
function shuffledOffers(station){const a=[{s:station.good,r:"COMMON"},{s:station.rare,r:"RARE"},{s:station.bad,r:"COMMON"}];const shift=(run+state.line)%3;return a.slice(shift).concat(a.slice(0,shift))}
function begin(){run++;state={line:0,ink:12,jam:0,ok:0,selected:null,offset:0,printed:false,reroll:1,letters:[],offers:[],started:performance.now()};loadStation();renderAll()}
function station(){return STATIONS[state.line]}
function loadStation(){state.selected=null;state.offset=0;state.printed=false;state.offers=shuffledOffers(station());$("event").className="event";$("event").textContent=t("event")}
function ribbonAt(){if(state.selected===null)return Array(11).fill(" ");const chars=state.offers[state.selected].s.split(""),out=Array(11).fill(" ");chars.forEach((ch,i)=>{if(state.offset+i<11)out[state.offset+i]=ch});return out}
function output(){const base=station().base.split(""),rib=ribbonAt();return base.map((ch,i)=>fuse(ch,rib[i]))}
function assessment(){const out=output(),m=MACHINES[station().m];return{out,hit:out[station().col]===m.glyph,jams:out.filter(c=>c==="?").length,m}}
function cells(rowId,chars,type){const el=$(rowId);el.replaceChildren();chars.forEach((ch,i)=>{const s=document.createElement("span");s.className="cell "+type+(ch===" "||ch==="."?" blank":"");if(i===station().col)s.classList.add("target");if(type==="fused"&&ch==="?")s.classList.add("jam");if(type==="fused"&&i===station().col&&ch===MACHINES[station().m].glyph)s.classList.add("hit");s.textContent=ch===" "?"·":ch;el.appendChild(s)})}
function renderRows(){const a=assessment();cells("baseRow",station().base.split(""),"base");cells("ribbonRow",ribbonAt(),"ribbon");cells("printRow",a.out,"fused");$("targetState").textContent=a.hit?t("ready"):t("miss");$("targetState").className=a.hit?"ok":""}
function renderRibbons(){$("ribbons").replaceChildren();state.offers.forEach((o,i)=>{const b=document.createElement("button");b.type="button";b.className="ribbon-card"+(state.selected===i?" selected":"")+(o.r==="RARE"?" rare":"");b.innerHTML=`<code>${o.s}</code><small>${o.r}</small>`;b.disabled=state.printed;b.onclick=()=>{state.selected=i;state.offset=0;renderAll();$("event").textContent=t("preview")};$("ribbons").appendChild(b)})}
function renderMachine(){const a=assessment(),active=state.printed&&a.hit;$("machineView").textContent=active?a.m.art.on:a.m.art.idle;$("machineView").className=state.printed?(a.hit?"good":"bad"):"";$("machineNeed").textContent=`${a.m[lang]} / ${a.m.glyph}`}
function renderArchive(){const line=state.letters.join("");$("archive").textContent=line?`[ ${line}${"_".repeat(Math.max(0,6-line.length))} ]`:`[ ______ ]`}
function renderAll(){document.documentElement.lang=lang;$("title").textContent=t("title");$("briefCopy").textContent=t("brief");$("machineLabel").textContent=t("machine");$("targetCopy").textContent=t("target")(station().col,MACHINES[station().m].glyph);$("ribbonTitle").textContent=t("ribbon");$("ribbonHint").textContent=t("hint");$("archiveTitle").textContent=t("archive");$("inkNo").textContent=state.ink;$("jamNo").textContent=state.jam+"/3";$("lineNo").textContent=state.line+1+"/6";$("offsetNo").textContent=String(state.offset).padStart(2,"0");$("leftBtn").disabled=state.printed||state.selected===null||state.offset<=0;$("rightBtn").disabled=state.printed||state.selected===null||state.offset>=6;$("rerollBtn").disabled=state.printed||state.reroll<=0;$("printBtn").disabled=!state.printed&&state.selected===null;$("printBtn").textContent=state.printed?t("next"):t("print");renderRows();renderRibbons();renderMachine();renderArchive()}
function move(delta){if(state.selected===null||state.printed)return;state.offset=Math.max(0,Math.min(6,state.offset+delta));renderAll();$("event").textContent=t("preview")}
function printLine(){if(state.printed){next();return}if(state.selected===null)return;const a=assessment();state.printed=true;state.ink-=1+a.jams;if(a.hit){state.ok++;state.letters.push(station().letter);$("event").className="event good";$("event").textContent=t("success")(a.m.glyph,a.jams)}else{state.jam++;$("event").className="event bad";$("event").textContent=t("failure")(a.m.glyph)}renderAll();if(state.ink<=0||state.jam>=3)setTimeout(finish,400)}
function next(){if(state.line>=STATIONS.length-1){finish();return}state.line++;loadStation();renderAll()}
function reroll(){if(state.reroll<=0||state.printed)return;state.reroll--;const s=station();state.offers=[{s:s.rare,r:"RARE"},{s:s.good,r:"COMMON"},{s:".....",r:"BLANK"}];state.selected=null;state.offset=0;renderAll()}
function finish(){const won=state.ok>=5&&state.jam<3&&state.ink>0,line=state.letters.join("");if(won&&!meta.lines.includes(line))meta.lines.push(line);$("resultTag").textContent=won?"ONLINE":"OFFLINE";$("resultRun").textContent=`R${run} · ${Math.round((performance.now()-state.started)/1000)}s`;$("resultTitle").textContent=won?t("win"):t("lose");$("resultCopy").textContent=won?t("winCopy"):t("loseCopy");$("okLabel").textContent=t("ok");$("okNo").textContent=state.ok+"/6";$("resInk").textContent=state.ink;$("resJam").textContent=state.jam;$("story").textContent=`${t("story")}: ${line||"------"}${meta.lines.length>1?" / "+meta.lines.join(" · "):""}`;$("againBtn").textContent=t("again");$("result").hidden=false}
function renderCover(){document.documentElement.lang=lang;$("coverTitle").textContent=t("coverTitle");$("coverLead").textContent=t("coverLead");$("coverRules").innerHTML=t("coverRules");$("startBtn").textContent=t("start");$("langBtn").textContent=lang==="ko"?"EN":"KO"}
$("langBtn").onclick=()=>{lang=lang==="ko"?"en":"ko";renderCover()};$("startBtn").onclick=()=>{$("cover").hidden=true;begin()};$("leftBtn").onclick=()=>move(-1);$("rightBtn").onclick=()=>move(1);$("printBtn").onclick=printLine;$("rerollBtn").onclick=reroll;$("againBtn").onclick=()=>{$("result").hidden=true;begin()};renderCover();
window.__TOY09__={start:()=>{$("cover").hidden=true;begin()},select:i=>{state.selected=i;state.offset=0;renderAll()},move,print:printLine,getState:()=>state?JSON.parse(JSON.stringify(state)):null};
</script>
</body>
</html>
